# Zo Tunnel Client Configuration (example)
#
# Usage:
#   zo-tunnel-client --config client.yaml
#
# Or use CLI flags directly:
#   zo-tunnel-client --server vps:6200 --local localhost:3000 --id my-api --token YOUR_TOKEN

server: "vps-ip:6200"              # Server address (host:port)
client_id: "my-webapp"             # Tunnel name — used as identifier
local_addr: "localhost:3000"       # Local service to forward to
token: "your-token"                # Auth token (from server setup)

reconnect:
  enabled: true                    # Auto-reconnect on disconnect
  max_interval: 30                 # Max seconds between attempts (exponential backoff)

# TLS for the control channel (requires server TLS enabled)
# tls:
#   enabled: true
#   server_name: ""                # SNI name (default: hostname from server)
#   skip_verify: false             # DANGEROUS: skip cert verification
