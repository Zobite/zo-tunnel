<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zo Tunnel Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">🚀 Zo Tunnel</div>
                <span class="badge" id="status-badge">connecting...</span>
            </div>
            <div class="header-right">
                <span class="uptime" id="uptime">—</span>
            </div>
        </header>

        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Connected Clients</div>
                <div class="stat-value" id="stat-clients">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Requests</div>
                <div class="stat-value" id="stat-requests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Connections</div>
                <div class="stat-value" id="stat-active">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Data Transferred</div>
                <div class="stat-value" id="stat-data">0 B</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Failed Auth</div>
                <div class="stat-value" id="stat-failed-auth">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Rate Limited</div>
                <div class="stat-value" id="stat-rate-limited">0</div>
            </div>
        </div>

        <section class="section">
            <h2 class="section-title">Connected Tunnels</h2>
            <div class="table-container">
                <table class="table" id="clients-table">
                    <thead>
                        <tr>
                            <th>Client ID</th>
                            <th>Mode</th>
                            <th>Connected</th>
                            <th>Requests</th>
                            <th>Active</th>
                            <th>Data In</th>
                            <th>Data Out</th>
                        </tr>
                    </thead>
                    <tbody id="clients-body">
                        <tr><td colspan="7" class="empty">No clients connected</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="footer">
            Zo Tunnel Dashboard — Auto-refreshes every 2s
        </footer>
    </div>
    <script src="/app.js"></script>
</body>
</html>
