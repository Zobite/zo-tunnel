# Zo Tunnel Server — Docker Compose
# Usage: docker compose up -d

services:
  zo-tunnel-server:
    image: ghcr.io/zobite/zo-tunnel-server:latest
    # Or build locally:
    # build:
    #   context: .
    #   target: server
    ports:
      - "6200:6200"             # Control channel (client connections)
      - "6210:6210"             # Public HTTP proxy
      - "6220:6220"             # Dashboard UI
      - "10000-10020:10000-10020"  # TCP tunnel ports
    environment:
      - ZO_TOKEN=${ZO_TOKEN:-changeme}
      - RUST_LOG=info
    restart: unless-stopped
    # Optional: mount config file
    # volumes:
    #   - ./configs/server.yaml:/etc/zo-tunnel/server.yaml
    # command: ["--config", "/etc/zo-tunnel/server.yaml"]
